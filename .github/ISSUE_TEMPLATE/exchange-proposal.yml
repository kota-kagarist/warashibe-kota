name: 交換提案
description: 現在のモノとの交換案を公開提案する
title: "[交換提案] "
labels: ["type:exchange", "status:inbox"]
body:
  - type: markdown
    attributes:
      value: |
        このIssueは公開されます。本名、住所、電話番号、メールアドレス、勤務先、追跡番号、受け渡し場所を書かないでください。
  - type: input
    id: item
    attributes:
      label: 提案するモノ
      description: メーカー名や型番は、公開して問題ない範囲で記載してください。
      placeholder: 例）コンパクトなコーヒーミル
    validations:
      required: true
  - type: textarea
    id: condition
    attributes:
      label: 状態と付属品
      description: 傷、使用歴、不具合、付属品の有無を正直に記載してください。個人情報が写った写真は添付しないでください。
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: 交換したい理由
      description: なぜ現在のモノと交換したいか、交換後にどう使いたいかを記載してください。
    validations:
      required: true
  - type: dropdown
    id: delivery
    attributes:
      label: 想定する受け渡し方法
      options:
        - 郵送を希望
        - 手渡しも検討可能
        - どちらでもよい
        - まだ決めていない
    validations:
      required: true
  - type: checkboxes
    id: confirmations
    attributes:
      label: 確認事項
      options:
        - label: 違法品、危険物、医薬品、衛生上問題のある物、権利侵害品ではありません。
          required: true
        - label: このIssueが公開されることを理解しています。
          required: true
        - label: 個人を特定できる情報を記載していません。
          required: true
        - label: 提案が採用されない場合があることを理解しています。
          required: true
